kind = "web"
previewPath = "/"
title = "MTVC Van Control System"
version = "1.0.0"
id = "artifacts/mtvc-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22537

[services.development]
run = "pnpm --filter @workspace/mtvc-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mtvc-dashboard", "run", "build" ]
publicDir = "artifacts/mtvc-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22537"
BASE_PATH = "/"
